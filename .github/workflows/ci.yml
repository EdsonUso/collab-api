name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Compile
        run: mvn compile -B -q

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: build

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: collabdb_test
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Run tests
        run: mvn verify -B -q -Dspring.profiles.active=test
        env:
          DB_USER: root
          DB_PASS: root
          JWT_SECRET: ci-test-secret-key-min-256-bits-for-jwt-signing-algorithm
          GOOGLE_CLIENT_ID: fake-google-id
          GOOGLE_CLIENT_SECRET: fake-google-secret
          GITHUB_CLIENT_ID: fake-github-id
          GITHUB_CLIENT_SECRET: fake-github-secret

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/main'

    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR
        run: mvn package -B -q -DskipTests

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: collab-api
          path: target/*.jar
          retention-days: 7
