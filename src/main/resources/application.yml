server:
  port: 8080
  servlet:
    context-path: /api

spring:
  profiles:
    active: dev
  application:
    name: collab-api

  # ?? JPA / Hibernate ??
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: validate            # Flyway gerencia o schema
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
        format_sql: true

  # ?? Flyway ??
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true

  # ?? Jackson ??
  jackson:
    default-property-inclusion: non_null
    serialization:
      write-dates-as-timestamps: false

  # ?? OAuth2 Client Registration ??
  security:
    oauth2:
      client:
        registration:
          google:
            client-id: ${GOOGLE_CLIENT_ID}
            client-secret: ${GOOGLE_CLIENT_SECRET}
            scope: openid, profile, email
            redirect-uri: "{baseUrl}/oauth2/callback/{registrationId}"
          github:
            client-id: ${GITHUB_CLIENT_ID}
            client-secret: ${GITHUB_CLIENT_SECRET}
            scope: user:email, read:user
            redirect-uri: "{baseUrl}/oauth2/callback/{registrationId}"
        provider:
          github:
            authorization-uri: https://github.com/login/oauth/authorize
            token-uri: https://github.com/login/oauth/access_token
            user-info-uri: https://api.github.com/user
            user-name-attribute: login

# ?? App-specific: JWT ??
app:
  jwt:
    secret: ${JWT_SECRET}
    access-token-expiration-ms: 900000        # 15 min
    refresh-token-expiration-ms: 604800000    # 7 dias
  cors:
    allowed-origins: ${CORS_ORIGINS:http://localhost:5173,http://localhost:3000}
  oauth2:
    # Ap�s OAuth2 success, redireciona p/ frontend com token
    redirect-uri: ${OAUTH2_REDIRECT_URI:http://localhost:5173/oauth2/redirect}

---
# ??????????????????????????????????????
# Profile: dev
# ??????????????????????????????????????
spring:
  config:
    activate:
      on-profile: dev

  datasource:
    url: jdbc:mysql://localhost:3306/collabdb?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USER}
    password: ${DB_PASS}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    show-sql: true

logging:
  level:
    com.collab: DEBUG
    org.springframework.security: DEBUG
    org.hibernate.SQL: DEBUG

---
# ??????????????????????????????????????
# Profile: prod
# ??????????????????????????????????????
spring:
  config:
    activate:
      on-profile: prod

  datasource:
    url: ${DATABASE_URL}
    username: ${DB_USER}
    password: ${DB_PASS}

logging:
  level:
    com.collab: INFO
    org.springframework.security: WARN